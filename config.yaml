# WebRig Configuration
# Copy to config.local.yaml and adjust for your setup.

radio:
  # Direct hamlib (no rigctld needed)
  model_id: 3087                # hamlib model number (3087=Xiegu X6100)
  serial_port: "/dev/ttyACM1"
  serial_baud: 19200
  poll_interval_ms: 200          # S-Meter polling interval
  freq_poll_interval_ms: 1000    # Frequency/mode polling interval
  reconnect_delay_s: 3           # retry delay if radio unreachable

audio:
  sample_rate: 8000
  channels: 1
  chunk_ms: 80                   # milliseconds per audio chunk
  device_rx: "default"           # ALSA capture device
  device_tx: "default"           # ALSA playback device
  max_chunk_ms: 200              # adaptive: max chunk on bad connections
  squelch_enabled: true
  squelch_threshold: 300

ptt:
  mode: "hamlib"                 # "hamlib" | "serial_rts" | "serial_dtr" | "vox"
  serial_port: ""                # only for serial_rts/serial_dtr

server:
  host: "0.0.0.0"
  port: 8081
  cors_origins: ["*"]

auth:
  jwt_secret: "CHANGE-ME-IN-PRODUCTION"
  session_timeout_minutes: 120
  users_file: "users.json"

logging:
  level: "INFO"
  format: "text"                 # "json" or "text"
